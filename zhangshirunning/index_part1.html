<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张师快跑</title>
    <style>
        /* ========== 页面样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            /* 防止页面滚动（空格键默认行为） */
            touch-action: none;
        }

        /* 游戏容器：给画布加一圈装饰边框 */
        .game-container {
            position: relative;
            border: 4px solid #FFD700;
            border-radius: 12px;
            box-shadow:
                0 0 30px rgba(255, 215, 0, 0.3),
                0 0 60px rgba(255, 215, 0, 0.1),
                0 8px 32px rgba(0, 0, 0, 0.5);
            /* 圆角裁切 */
            overflow: hidden;
        }

        canvas {
            display: block;
            /* 防止 canvas 默认的 inline 间隙 */
        }

        /* 底部提示 */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 1px;
        }
    </style>
</head>

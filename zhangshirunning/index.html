    <title>张师快跑</title>
    <style>
        /* ========== 页面样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            /* 防止页面滚动（空格键默认行为） */
            touch-action: none;
        }

        /* 游戏容器：给画布加一圈装饰边框 */
        .game-container {
            position: relative;
            border: 4px solid #FFD700;
            border-radius: 12px;
            box-shadow:
                0 0 30px rgba(255, 215, 0, 0.3),
                0 0 60px rgba(255, 215, 0, 0.1),
                0 8px 32px rgba(0, 0, 0, 0.5);
            /* 圆角裁切 */
            overflow: hidden;
        }

        canvas {
            display: block;
            /* 防止 canvas 默认的 inline 间隙 */
        }

        /* 底部提示 */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 1px;
        }
    </style>
</head>

        // ============================================================
        //  跑酷小游戏 — index.html

        // -------------------- 全局配置 CONFIG --------------------

            // 画布
            CANVAS_WIDTH: 900,
            CANVAS_HEIGHT: 500,

            // 性能
            TARGET_FPS: 60,
            FRAME_TIME: 1000 / 60, // ≈16.67ms

            SPEED_BOOST_DURATION: 360, // 加速持续帧数（6秒 × 60fps）

            HEART_RATE_FILL_TIME: 35, // 心率从空到满的秒数

            PILL_SPAWN_INTERVAL_MIN: 280, // 药丸最小间隔
            PILL_SIZE: 28,          // 药丸宽度
            PILL_HEIGHT: 16,        // 药丸高度
            PILL_COLOR_RED: '#FF3333',    // 药丸红色
            PILL_COLOR_WHITE: '#FFFEF0',  // 药丸白色

            // 加速道具

            BOOST_CHOCLEZ_COLOR: '#FF69B4',  // 巧乐兹粉色
            BOOST_SPRITE_COLOR: '#00CC66',   // 雪碧绿色

            HR_COLOR_WARN: '#FFC107',   // 黄色（50-75%）

            JUMP_MAX_HEIGHT: 120, // 跳跃最大高度（px）
            JUMP_DURATION: 40, // 跳跃持续帧数（总帧数，上下各半）
            JUMP_VELOCITY: -4,  // 跳跃初速度（负值=向上，px/帧）
            JUMP_GRAVITY: 0.0667,  // 重力加速度 = 精确2秒滞空
            DUCK_DURATION: 30, // 低头持续帧数（0.5秒）

            OBS_BOX_COLOR: '#8B5E3C',  // 箱子主色
            OBS_BOX_STRIPE: '#A0724A', // 箱子条纹
            OBS_BEAM_COLOR: '#777777', // 横梁主色
            OBS_BEAM_STRIPE: '#FFD700',// 横梁警示条纹

            // 角色
            PLAYER_X_RATIO: 0.25, // 角色在画面中的水平位置比例
            PLAYER_GROUND_Y: 380, // 角色站立时脚底 Y 坐标

            // 角色外观颜色
            PLAYER_SKIN: '#FFDAB9',      // 脸部肤色
            PLAYER_SKIN_PURPLE1: '#DDA0DD', // 浅紫（心率 25-50%）
            PLAYER_SKIN_PURPLE2: '#BA55D3', // 中紫（心率 50-75%）
            PLAYER_SKIN_PURPLE3: '#8B008B', // 深紫（心率 75-100%）
            PLAYER_SHIRT: '#FFD700',     // 上衣黄色
            PLAYER_SHIRT_DARK: '#E6BE00', // 上衣暗部
            PLAYER_PANTS: '#228B22',     // 裤子绿色
            PLAYER_PANTS_DARK: '#1A6B1A', // 裤子暗部
            PLAYER_SHOE: '#FF4444',      // 鞋子红色
            PLAYER_SHOE_DARK: '#CC0000', // 鞋子暗部
            PLAYER_HAIR: '#5C3317',      // 头发棕色
            PLAYER_EYE: '#333333',       // 眼睛深色

            // 角色尺寸
            PLAYER_HEAD_RADIUS: 13,
            PLAYER_BODY_WIDTH: 22,
            PLAYER_BODY_HEIGHT: 26,
            PLAYER_LEG_LENGTH: 22,
            PLAYER_ARM_LENGTH: 18,
            PLAYER_TOTAL_HEIGHT: 68,

            // 奔跑动画
            RUN_ANIM_SPEED: 0.3, // 动画周期（秒）

            // 碰撞宽容度（缩小判定区域的比例）
            HITBOX_SHRINK: 0.85,

            // 背景视差滚动速度（相对基础速度的比例）
            BG_SKY_SPEED: 0.3,   // 天空层最慢
            BG_FAR_SPEED: 0.6,   // 远景层中等
            BG_NEAR_SPEED: 1.0,  // 近景层与游戏同步

            // 背景颜色
            SKY_TOP: '#4FA4E0',      // 天空顶部
            SKY_BOTTOM: '#B0D8F0',   // 天空底部（地平线）
            FAR_MOUNTAIN: '#6B9B6B', // 远山颜色
            FAR_MOUNTAIN_LIGHT: '#8FBC8F', // 远山亮色
            GROUND_GRASS: '#5CB85C', // 草地
            GROUND_PATH: '#C8A86B',  // 土路
            GROUND_PATH_DARK: '#B8945A', // 土路暗部
            CLOUD_COLOR: 'rgba(255,255,255,0.85)',  // 云朵颜色
        };

        // 设置画布尺寸
        canvas.width = CONFIG.CANVAS_WIDTH;
        canvas.height = CONFIG.CANVAS_HEIGHT;

        // -------------------- 游戏状态机 --------------------
        const STATE = {
            READY: 'ready', // 开始界面
            PLAYING: 'playing', // 游戏中
            GAMEOVER: 'gameover', // 结束界面
        };

        // 当前游戏状态
        let gameState = STATE.READY;

        // -------------------- 玩家状态 --------------------
        let playerX = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO; // 角色水平位置
        let playerGroundY = CONFIG.PLAYER_GROUND_Y;                 // 角色站立的脚底 Y
        let playerY = 0;                  // 角色垂直偏移（0=地面，负值=跳跃中）
        let playerDucking = false;        // 是否正在低头
        let playerDuckTimer = 0;          // 低头剩余帧数
        let playerJumpVelocity = 0;       // 跳跃速度（像素/帧）
        let playerJumping = false;        // 是否在空中
        let playerOnBeam = null;         // 当前踩着的横梁引用（null=没踩）
        let heartRate = 0;               // 当前心率值 (0-100)

        // -------------------- 追赶者（安全员） --------------------
        let pursuerGap = 150;            // 追赶者落后距离（px）
        let pursuerAnimTime = 0;         // 追赶者动画计时
        const PURSUER_SPEED_EXTRA = 7 / 60; // 每秒比玩家多移动7px（每帧增量）
        let runAnimTime = 0;             // 奔跑动画计时器（秒）
        let gameSpeed = CONFIG.BASE_SPEED; // 当前实际游戏速度（可被加速道具改变）
        let gameTime = 0;               // 游戏已运行时间（秒），用于难度递增

        // -------------------- 障碍物系统 --------------------
        let obstacles = [];              // 当前活跃的障碍物数组
        let obstacleSpawnTimer = 0;      // 生成倒计时（帧）

        // -------------------- 道具系统 --------------------
        let pills = [];                  // 药丸数组
        let pillSpawnTimer = 80;         // 药丸生成倒计时（帧）
        let boostItems = [];             // 加速道具数组（巧乐兹/雪碧）
        let boostSpawnTimer = 200;       // 加速道具生成倒计时
        let boostActive = false;         // 是否处于加速状态
        let boostTimer = 0;              // 加速剩余帧数
        let score = 0;                   // 当前分数
        let distanceScore = 0;           // 距离累计分（浮点）
        let highScore = 0;               // 历史最高分

        // -------------------- 粒子特效 --------------------
        let particles = [];             // 粒子数组
        let screenShake = 0;            // 屏幕震动剩余帧数
        let screenFlash = 0;            // 屏幕闪烁剩余帧数

        // 读取历史最高分
        try {
            const saved = localStorage.getItem('parkour_highscore');
            if (saved !== null) highScore = parseInt(saved, 10) || 0;
        } catch (e) { /* 无 LocalStorage 权限则忽略 */ }

        // -------------------- 背景系统 --------------------
        // 各层滚动偏移量
        let bgSkyOffset = 0;
        let bgFarOffset = 0;
        let bgNearOffset = 0;

        // 预生成的云朵数据（每个云朵: {x, y, scale}）
        let clouds = [];
        // 预生成的山脉数据（每座山: {x, height, width}）
        let mountains = [];
        // 草地装饰物（小花/草簇）
        let grassDecorations = [];

        // 初始化背景数据
        function initBackground() {
            // 生成云朵（在 3 倍画布宽度上分布，保证滚动不露馅）
            clouds = [];
            const cloudCount = 18;
            for (let i = 0; i < cloudCount; i++) {
                clouds.push({
                    x: Math.random() * CONFIG.CANVAS_WIDTH * 3,
                    y: 20 + Math.random() * 100, // 天空上半部分
                    scale: 0.5 + Math.random() * 1.2, // 大小变化
                    speed: 0.2 + Math.random() * 0.3, // 微小漂移
                });
            }
            // 按 x 坐标排序，让绘制顺序合理
            clouds.sort((a, b) => a.x - b.x);

            // 生成远山轮廓
            mountains = [];
            let mx = 0;
            while (mx < CONFIG.CANVAS_WIDTH * 3) {
                const w = 100 + Math.random() * 180;
                const h = 80 + Math.random() * 100;
                mountains.push({ x: mx, width: w, height: h });
                mx += w * 0.65; // 山之间部分重叠
            }

            // 生成草地装饰
            grassDecorations = [];
            for (let i = 0; i < 40; i++) {
                grassDecorations.push({
                    x: Math.random() * CONFIG.CANVAS_WIDTH * 3,
                    type: Math.random() < 0.5 ? 'flower' : 'tuft',
                    color: Math.random() < 0.5 ? '#FFEB3B' : '#FF9800', // 黄色或橙色小花
                    size: 3 + Math.random() * 5,
                });
            }
        }

        // 启动时初始化背景
        initBackground();

        // -------------------- FPS 计算 --------------------
        let fps = 0;
        let fpsFrames = 0; // 当前秒内累计帧数
        let fpsElapsed = 0; // 当前秒内累计时间
        let showFPS = true; // 是否显示 FPS（调试用，后续可关闭）

        // -------------------- 时间管理 --------------------
        let lastTime = 0; // 上一帧时间戳

        // -------------------- 输入处理 --------------------
        // 当前按下的键
        const keys = {};
        // 空格键是否已被处理（防止按住空格连续触发）
        let spaceHandled = false;

        // 键盘按下事件
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            // 阻止空格键的默认滚动行为
            if (e.code === 'Space') {
                e.preventDefault();

                // 开始界面 / 结束界面：按空格开始 / 重新开始
                if (!spaceHandled) {
                    spaceHandled = true;
                    if (gameState === STATE.READY || gameState === STATE.GAMEOVER) {
                        startGame();
                    } else if (gameState === STATE.PLAYING) {
                        // 游戏中：触发跳跃（不能在空中二段跳，不能低头时跳）
                        if (!playerJumping && !playerDucking) {
                            playerJumping = true;
                            playerJumpVelocity = CONFIG.JUMP_VELOCITY;
                            playerOnBeam = null; // 从横梁上跳下

            // 阻止 M 键的默认行为（某些浏览器可能触发菜单）
            if (e.code === 'KeyM') {
                e.preventDefault();
                // 按住 M = 低头，松手恢复，空中不能低头
                if (gameState === STATE.PLAYING && !playerJumping) {
                    playerDucking = true;
                }
            }
        });

        // 键盘松开事件
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;

            if (e.code === 'Space') {
                spaceHandled = false;
            }
            if (e.code === 'KeyM') {
                // 松手恢复站立
                playerDucking = false;
            }
        });

        // -------------------- 游戏启动 --------------------
        function startGame() {
            gameState = STATE.PLAYING;

            // 播放背景音乐
            const bgm = document.getElementById("bgmAudio");
            if (bgm) { bgm.currentTime = 0; bgm.play().catch(function(){}); }

            // 重置背景偏移量（新游戏从零开始）
            bgSkyOffset = 0;
            bgFarOffset = 0;
            bgNearOffset = 0;

            // 重置玩家状态
            playerY = 0;
            playerDucking = false;
            playerDuckTimer = 0;
            playerJumpVelocity = 0;
            playerJumping = false;
            playerOnBeam = null;
            heartRate = 0;
            runAnimTime = 0;
            pursuerGap = 150;
            pursuerAnimTime = 0;
            gameSpeed = CONFIG.BASE_SPEED;
            gameTime = 0;

            // 重置障碍物 + 道具
            obstacles = [];
            obstacleSpawnTimer = 60;
            pills = [];
            pillSpawnTimer = 80;
            boostItems = [];
            boostSpawnTimer = 200;
            boostActive = false;
            boostTimer = 0;
            score = 0;
            distanceScore = 0;
            particles = [];
            screenShake = 0;
            screenFlash = 0;

            console.log('游戏开始！');
        }

        // -------------------- 更新逻辑 --------------------
        function update(dt) {
            // 先计算当前速度（供背景和游戏对象使用）
            if (gameState === STATE.PLAYING) {
                gameSpeed = CONFIG.BASE_SPEED + gameTime * 0.04;
            }
            const bgSpeed = (gameState === STATE.PLAYING)
                ? (boostActive ? gameSpeed * CONFIG.SPEED_BOOST_MULTIPLIER : gameSpeed)
                : CONFIG.BASE_SPEED * 0.4;

            bgSkyOffset += bgSpeed * CONFIG.BG_SKY_SPEED;
            bgFarOffset += bgSpeed * CONFIG.BG_FAR_SPEED;
            bgNearOffset += bgSpeed * CONFIG.BG_NEAR_SPEED;

            if (bgSkyOffset >= CONFIG.CANVAS_WIDTH) bgSkyOffset -= CONFIG.CANVAS_WIDTH;
            if (bgFarOffset >= CONFIG.CANVAS_WIDTH) bgFarOffset -= CONFIG.CANVAS_WIDTH;
            if (bgNearOffset >= CONFIG.CANVAS_WIDTH) bgNearOffset -= CONFIG.CANVAS_WIDTH;

            // 游戏中更新
            if (gameState === STATE.PLAYING) {
                const dtSec = dt / 1000;
                runAnimTime += dtSec;
                gameTime += dtSec;

                // ---- 难度递增：障碍间隔 ----
                // (gameSpeed 已在 update 顶部计算)
                if (boostActive) {
                    boostTimer--;
                    if (boostTimer <= 0) {
                        boostActive = false;
                        boostTimer = 0;
                    }
                }
                // 加速状态下速度翻倍
                const effectiveSpeed = boostActive
                    ? gameSpeed * CONFIG.SPEED_BOOST_MULTIPLIER
                    : gameSpeed;

                const currentInterval = Math.max(
                    120, // 最密不超过 120 帧间隔
                    CONFIG.OBSTACLE_MIN_INTERVAL - gameTime * CONFIG.OBSTACLE_INTERVAL_DECREASE
                );

                // ---- 障碍物生成 ----
                obstacleSpawnTimer--;
                if (obstacleSpawnTimer <= 0) {
                    spawnObstacle();
                    // 随机间隔：currentInterval ± 30%
                    obstacleSpawnTimer = Math.floor(currentInterval * (0.7 + Math.random() * 0.6));
                }

                // ---- 障碍物移动 + 越界清理 ----
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].x -= effectiveSpeed;
                    if (obstacles[i].x < -150) {
                        obstacles.splice(i, 1); // 移除屏幕外障碍物
                    }
                }

                // ---- 跳跃物理 ----
                if (playerJumping) {
                    playerJumpVelocity += CONFIG.JUMP_GRAVITY;
                    playerY += playerJumpVelocity;
                    // 如果踩到横梁顶部就站上去
                    const landedBeam = checkBeamLanding();
                    if (landedBeam) {
                        playerY = landedBeam.y - CONFIG.OBS_OVERHEAD_H - CONFIG.PLAYER_GROUND_Y;
                        playerJumpVelocity = 0;
                        playerJumping = false;
                        playerOnBeam = landedBeam;
                    } else if (playerY >= 0) {
                        playerY = 0;
                        playerJumpVelocity = 0;
                        playerJumping = false;
                        playerOnBeam = null;
                    }
                }

                // ---- 横梁骑行 ----
                if (playerOnBeam) {
                    // 检查是否还在横梁上方
                    const beam = playerOnBeam;
                    const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
                    const pw = CONFIG.PLAYER_BODY_WIDTH * 0.8;
                    if (px + pw / 2 < beam.x || px - pw / 2 > beam.x + beam.width) {
                        // 走出去了，掉落
                        playerOnBeam = null;
                        playerJumping = true;
                        playerJumpVelocity = 0;
                    } else {
                        // 跟着横梁移动
                        playerY = beam.y - CONFIG.OBS_OVERHEAD_H - CONFIG.PLAYER_GROUND_Y;
                    }
                }

                // ---- 碰撞检测 ----
                if (checkCollision()) {
                    endGame();
                    return;
                }

                // ---- 低头状态（按住 M 保持，松手即恢复） ----

                // ---- 药丸生成 ----
                const pillInterval = Math.max(
                    CONFIG.PILL_SPAWN_INTERVAL_MIN,
                    CONFIG.PILL_SPAWN_INTERVAL - gameTime * 0.8
                );
                pillSpawnTimer--;
                if (pillSpawnTimer <= 0) {
                    spawnPill();
                    pillSpawnTimer = Math.floor(pillInterval * (0.7 + Math.random() * 0.6));
                }

                // ---- 药丸移动 + 越界清理 ----
                for (let i = pills.length - 1; i >= 0; i--) {
                    pills[i].x -= effectiveSpeed;
                    if (pills[i].x < -80) {
                        pills.splice(i, 1);
                    }
                }

                // ---- 药丸碰撞检测 ----
                checkPillCollection();

                // ---- 加速道具生成 ----
                boostSpawnTimer--;
                if (boostSpawnTimer <= 0) {
                    spawnBoostItem();
                    boostSpawnTimer = Math.floor(
                        CONFIG.BOOST_SPAWN_INTERVAL * (0.7 + Math.random() * 0.6)
                    );
                }

                // ---- 加速道具移动 + 越界清理 ----
                for (let i = boostItems.length - 1; i >= 0; i--) {
                    boostItems[i].x -= effectiveSpeed;
                    if (boostItems[i].x < -80) {
                        boostItems.splice(i, 1);
                    }
                }

                // ---- 加速道具碰撞检测 ----
                checkBoostCollection();

                // ---- 追赶者距离变化 ----
                // 追赶者基础速度 = gameSpeed（不受加速影响），但每秒多走3px
                // 加速时玩家变快拉大距离，平时追赶者慢慢逼近
                const pursuerWorldSpeed = gameSpeed + PURSUER_SPEED_EXTRA;
                pursuerGap -= (pursuerWorldSpeed - effectiveSpeed);
                // 追上了 → 游戏结束
                if (pursuerGap <= 5) {
                    endGame('pursuer');
                    return;
                }
                // 不能掉出画面外（最多拉开180px）
                if (pursuerGap > 180) pursuerGap = 180;
                pursuerAnimTime += dtSec;

                // ---- 计分 ----
                distanceScore += CONFIG.SCORE_PER_FRAME * (effectiveSpeed / CONFIG.BASE_SPEED);
                score = Math.floor(distanceScore);

                // ---- 粒子更新 ----
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2; // 重力
                    p.life--;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // ---- 屏幕特效衰减 ----
                if (screenShake > 0) screenShake--;
                if (screenFlash > 0) screenFlash--;

                // ---- 心率上涨 ----
                if (heartRate < CONFIG.HEART_RATE_MAX) {
                    heartRate += (CONFIG.HEART_RATE_MAX / CONFIG.HEART_RATE_FILL_TIME) * dtSec;
                    if (heartRate >= CONFIG.HEART_RATE_MAX) {
                        heartRate = CONFIG.HEART_RATE_MAX;
                        // 心率满 → 游戏结束
                        endGame('heart');
                        return;
                    }
                }
            }
        }

        // -------------------- 障碍物 --------------------

        // 检测玩家是否落在横梁顶部，返回横梁对象或 null
        function checkBeamLanding() {
            const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
            const py = CONFIG.PLAYER_GROUND_Y + playerY;
            const playerFeetY = py;
            const playerWidth = CONFIG.PLAYER_BODY_WIDTH * 0.8;

            for (const obs of obstacles) {
                if (obs.type !== 'overhead') continue;
                const beamTop = obs.y - CONFIG.OBS_OVERHEAD_H;
                // 玩家脚底在横梁顶部附近，且水平重叠
                if (
                    playerFeetY <= beamTop + 6 &&    // 脚没超过横梁顶太多
                    playerFeetY >= beamTop - 8 &&    // 脚不低于横梁顶太多
                    playerJumpVelocity >= 0 &&        // 正在下落
                    px + playerWidth / 2 > obs.x &&
                    px - playerWidth / 2 < obs.x + obs.width
                ) {
                    return obs;
                }
            }
            return null;
        }

        // 生成一个障碍物
        function spawnObstacle() {
            const type = Math.random() < 0.5 ? 'ground' : 'overhead';
            const obs = {
                type: type,
                x: CONFIG.OBSTACLE_SPAWN_X,
                y: type === 'ground'
                    ? CONFIG.PLAYER_GROUND_Y - CONFIG.OBS_GROUND_H
                    : CONFIG.OBS_OVERHEAD_Y,
                width: type === 'ground' ? CONFIG.OBS_GROUND_W : CONFIG.OBS_OVERHEAD_W,
                height: type === 'ground' ? CONFIG.OBS_GROUND_H : CONFIG.OBS_OVERHEAD_H,
            };
            obstacles.push(obs);
        }

        // 碰撞检测（AABB + 宽容度）
        function checkCollision() {
            const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
            const py = CONFIG.PLAYER_GROUND_Y + playerY;
            const scaleY = playerDucking ? 0.55 : 1.0;
            // 玩家碰撞箱（基于角色尺寸，缩小一些做宽容处理）
            const pw = CONFIG.PLAYER_BODY_WIDTH * 0.8;
            const ph = CONFIG.PLAYER_TOTAL_HEIGHT * scaleY * 0.85;
            const px1 = px - pw / 2;
            const py1 = py - ph;

            for (const obs of obstacles) {
                // 踩在横梁上时不与它碰撞
                if (obs === playerOnBeam) continue;
                // 障碍物碰撞箱也略微缩小（宽容处理）
                const shrink = 0.9;
                const ox1 = obs.x + obs.width * (1 - shrink) / 2;
                const oy1 = obs.y + obs.height * (1 - shrink) / 2;
                const ow = obs.width * shrink;
                const oh = obs.height * shrink;

                // AABB 检测
                if (
                    px1 < ox1 + ow &&
                    px1 + pw > ox1 &&
                    py1 < oy1 + oh &&
                    py1 + ph > oy1
                ) {
                    return true; // 碰撞！
                }
            }
            return false;
        }

        // -------------------- 药丸道具 --------------------

        function spawnPill() {
            // 一半概率出现在地面，一半概率出现在横梁高度
            const onBeam = Math.random() < 0.5;
            const pillY = onBeam
                ? CONFIG.OBS_OVERHEAD_Y - CONFIG.OBS_OVERHEAD_H - CONFIG.PILL_HEIGHT - 5
                : CONFIG.PLAYER_GROUND_Y + CONFIG.PILL_Y_OFFSET;
            pills.push({
                x: CONFIG.OBSTACLE_SPAWN_X,
                y: pillY,
                width: CONFIG.PILL_SIZE,
                height: CONFIG.PILL_HEIGHT,
            });
        }

        function checkPillCollection() {
            const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
            const py = CONFIG.PLAYER_GROUND_Y + playerY;
            const scaleY = playerDucking ? 0.55 : 1.0;
            const pw = CONFIG.PLAYER_BODY_WIDTH * 1.2;
            const ph = CONFIG.PLAYER_TOTAL_HEIGHT * scaleY * 1.1;
            const px1 = px - pw / 2;
            const py1 = py - ph;

            for (let i = pills.length - 1; i >= 0; i--) {
                const p = pills[i];
                // AABB 拾取检测
                if (
                    px1 < p.x + p.width &&
                    px1 + pw > p.x &&
                    py1 < p.y + p.height &&
                    py1 + ph > p.y
                ) {
                    // 吃到药丸！
                    heartRate = Math.max(0, heartRate - CONFIG.HEART_RATE_MAX * CONFIG.PILL_REDUCE_PCT);
                    spawnParticles(p.x + p.width / 2, p.y + p.height / 2, '#FF4444', 10);
                    spawnParticles(p.x + p.width / 2, p.y + p.height / 2, '#FFFFFF', 8);
                    pills.splice(i, 1);
                }
            }
        }

        // -------------------- 加速道具 --------------------

        function spawnBoostItem() {
            // 随机选择巧乐兹或雪碧
            const type = Math.random() < 0.5 ? 'choclez' : 'sprite';
            boostItems.push({
                type: type,
                x: CONFIG.OBSTACLE_SPAWN_X,
                y: CONFIG.PLAYER_GROUND_Y + CONFIG.BOOST_Y_OFFSET,
                size: CONFIG.BOOST_SIZE,
            });
        }

        function checkBoostCollection() {
            const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
            const py = CONFIG.PLAYER_GROUND_Y + playerY;
            const scaleY = playerDucking ? 0.55 : 1.0;
            const pw = CONFIG.PLAYER_BODY_WIDTH * 1.2;
            const ph = CONFIG.PLAYER_TOTAL_HEIGHT * scaleY * 1.1;
            const px1 = px - pw / 2;
            const py1 = py - ph;

            for (let i = boostItems.length - 1; i >= 0; i--) {
                const item = boostItems[i];
                if (
                    px1 < item.x + item.size &&
                    px1 + pw > item.x &&
                    py1 < item.y + item.size &&
                    py1 + ph > item.y
                ) {
                    // 吃到加速道具！
                    boostActive = true;
                    boostTimer = CONFIG.SPEED_BOOST_DURATION;
                    distanceScore += CONFIG.BOOST_SCORE;
                    score = Math.floor(distanceScore);
                    const bColor = item.type === 'choclez' ? '#FF69B4' : '#00CC66';
                    spawnParticles(item.x + item.size / 2, item.y + item.size / 2, bColor, 14);
                    spawnParticles(item.x + item.size / 2, item.y + item.size / 2, '#FFD700', 8);
                    screenFlash = 8; // 小闪光
                    boostItems.splice(i, 1);
                }
            }
        }

        // -------------------- 粒子特效 --------------------

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2, // 初始向上偏
                    life: 15 + Math.floor(Math.random() * 15),
                    color: color,
                    size: 2 + Math.random() * 3,
                });
            }
        }

        function endGame(cause = 'obstacle') {
            gameState = STATE.GAMEOVER;
            // 暂停背景音乐
            const bgm2 = document.getElementById("bgmAudio");
            if (bgm2) bgm2.pause();
            window._deathCause = cause;
            // 死亡特效
            screenShake = 0;
            screenFlash = 0;
            const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
            const py = CONFIG.PLAYER_GROUND_Y + playerY;
            spawnParticles(px, py - 30, '#FF4444', 25);
            spawnParticles(px, py - 30, '#FFAA00', 15);
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                try {
                    localStorage.setItem('parkour_highscore', String(highScore));
                } catch (e) { /* 忽略 */ }
            }
        }

        // -------------------- 渲染 --------------------
        function render() {
            ctx.save();

            // 屏幕震动偏移
            if (screenShake > 0) {
                const sx = (Math.random() - 0.5) * screenShake * 0.8;
                const sy = (Math.random() - 0.5) * screenShake * 0.8;
                ctx.translate(sx, sy);
            }

            // 1. 背景
            drawBackground();

            // 2. 状态覆盖层
            switch (gameState) {
                case STATE.READY:
                    renderReadyScreen();
                    break;
                case STATE.PLAYING:
                    renderPlayingScreen();
                    break;
                case STATE.GAMEOVER:
                    renderGameOverScreen();
                    break;
            }

            // 3. 粒子（在所有内容上方）
            for (const p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // 4. 屏幕闪烁
            if (screenFlash > 0) {
                ctx.fillStyle = `rgba(255,255,255,${screenFlash / 20})`;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            }

            // 5. 心率危险红色边框
            if (gameState === STATE.PLAYING && heartRate / CONFIG.HEART_RATE_MAX > 0.7) {
                const pct = (heartRate / CONFIG.HEART_RATE_MAX - 0.7) / 0.3; // 0-1
                const alpha = pct * 0.5 * (0.6 + 0.4 * Math.sin(Date.now() / 200));
                ctx.strokeStyle = `rgba(255,0,0,${alpha})`;
                ctx.lineWidth = 8;
                ctx.strokeRect(4, 4, CONFIG.CANVAS_WIDTH - 8, CONFIG.CANVAS_HEIGHT - 8);
            }

            ctx.restore();

            // 6. FPS
            if (showFPS) {
                renderFPS();
            }
        }

        // -------------------- 视差背景绘制 --------------------

        // 绘制完整背景（三层叠加）
        function drawBackground() {
            // 先画天空渐变（覆盖全画布）
            const skyGrad = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            skyGrad.addColorStop(0, CONFIG.SKY_TOP);
            skyGrad.addColorStop(1, CONFIG.SKY_BOTTOM);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            // 层 1：天空 + 云朵
            drawSkyLayer();
            // 层 2：远山
            drawFarLayer();
            // 层 3：地面
            drawNearLayer();
        }

        // 绘制天空层（云朵）
        function drawSkyLayer() {
            const offset = bgSkyOffset;
            const w = CONFIG.CANVAS_WIDTH;

            // 画两遍实现无缝循环
            for (let copy = 0; copy < 2; copy++) {
                const baseX = -offset + copy * w;

                for (const cloud of clouds) {
                    const cx = baseX + cloud.x;
                    // 跳过明显不在画面内的云
                    if (cx < -200 || cx > w + 200) continue;

                    drawCloud(cx, cloud.y, cloud.scale);
                }
            }
        }

        // 画一朵卡通云
        function drawCloud(x, y, scale) {
            const s = scale;
            ctx.fillStyle = CONFIG.CLOUD_COLOR;
            ctx.beginPath();
            // 中心大圆
            ctx.arc(x, y, 25 * s, 0, Math.PI * 2);
            // 左边小圆
            ctx.arc(x - 18 * s, y + 5 * s, 18 * s, 0, Math.PI * 2);
            // 右边小圆
            ctx.arc(x + 20 * s, y + 3 * s, 20 * s, 0, Math.PI * 2);
            // 上面小圆
            ctx.arc(x + 2 * s, y - 12 * s, 16 * s, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制远景层（远山剪影）
        function drawFarLayer() {
            const offset = bgFarOffset;
            const w = CONFIG.CANVAS_WIDTH;
            const baseY = 340; // 远山脚部 Y 坐标
            const skyBottom = CONFIG.SKY_BOTTOM;

            for (let copy = 0; copy < 2; copy++) {
                const baseX = -offset + copy * w;

                // 远山背景层（较暗）
                ctx.fillStyle = CONFIG.FAR_MOUNTAIN;
                ctx.beginPath();
                ctx.moveTo(baseX, baseY);
                for (const m of mountains) {
                    const mx = baseX + m.x;
                    if (mx < -300 || mx > w + 300) continue;
                    const peakY = baseY - m.height;
                    // 用二次贝塞尔画圆润山形
                    ctx.quadraticCurveTo(mx + m.width * 0.35, peakY - 15, mx + m.width * 0.5, peakY);
                    ctx.quadraticCurveTo(mx + m.width * 0.65, peakY - 15, mx + m.width, baseY);
                }
                ctx.lineTo(baseX + w * 3, baseY);
                ctx.lineTo(baseX, baseY);
                ctx.closePath();
                ctx.fill();

                // 远山前景层（稍亮，略小的山）
                ctx.fillStyle = CONFIG.FAR_MOUNTAIN_LIGHT;
                ctx.beginPath();
                ctx.moveTo(baseX, baseY + 15);
                for (const m of mountains) {
                    const mx = baseX + m.x + m.width * 0.3;
                    if (mx < -200 || mx > w + 200) continue;
                    const peakY2 = baseY - m.height * 0.55;
                    const w2 = m.width * 0.7;
                    ctx.quadraticCurveTo(mx + w2 * 0.35, peakY2 - 10, mx + w2 * 0.5, peakY2);
                    ctx.quadraticCurveTo(mx + w2 * 0.65, peakY2 - 10, mx + w2, baseY + 15);
                }
                ctx.lineTo(baseX + w * 3, baseY + 15);
                ctx.lineTo(baseX, baseY + 15);
                ctx.closePath();
                ctx.fill();
            }
        }

        // 绘制近景层（草地 + 路径）
        function drawNearLayer() {
            const offset = bgNearOffset;
            const w = CONFIG.CANVAS_WIDTH;
            const groundY = CONFIG.PLAYER_GROUND_Y; // 380

            for (let copy = 0; copy < 2; copy++) {
                const baseX = -offset + copy * w;

                // 草地条
                ctx.fillStyle = CONFIG.GROUND_GRASS;
                ctx.fillRect(baseX, groundY - 20, w, 25);

                // 草地顶部锯齿/波浪效果
                ctx.fillStyle = CONFIG.GROUND_GRASS;
                ctx.beginPath();
                ctx.moveTo(baseX, groundY - 20);
                for (let x = baseX; x <= baseX + w; x += 12) {
                    const waveY = groundY - 20 - 3 + Math.sin(x * 0.3) * 4;
                    ctx.lineTo(x, waveY);
                }
                ctx.lineTo(baseX + w, groundY + 120);
                ctx.lineTo(baseX, groundY + 120);
                ctx.closePath();
                ctx.fill();

                // 土路
                ctx.fillStyle = CONFIG.GROUND_PATH;
                ctx.fillRect(baseX, groundY + 5, w, 120);

                // 路径纹理（横向条纹）
                ctx.fillStyle = CONFIG.GROUND_PATH_DARK;
                for (let y = groundY + 15; y < groundY + 120; y += 25) {
                    ctx.fillRect(baseX, y, w, 3);
                }

                // 草地小装饰（花和草簇）
                for (const g of grassDecorations) {
                    const gx = baseX + g.x;
                    if (gx < -10 || gx > w + 10) continue;
                    const gy = groundY - 22;

                    if (g.type === 'flower') {
                        // 小花：圆圈 + 中心点
                        ctx.fillStyle = g.color;
                        ctx.beginPath();
                        ctx.arc(gx, gy, g.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFF9C4';
                        ctx.beginPath();
                        ctx.arc(gx, gy, g.size * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // 小草簇
                        ctx.strokeStyle = '#4CAF50';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(gx, gy);
                        ctx.lineTo(gx - 3, gy - g.size - 4);
                        ctx.moveTo(gx, gy);
                        ctx.lineTo(gx + 1, gy - g.size - 2);
                        ctx.moveTo(gx, gy);
                        ctx.lineTo(gx + 4, gy - g.size - 5);
                        ctx.stroke();
                    }
                }
            }
        }

        // -------------------- 游戏画面覆盖层 --------------------
        function renderPlayingScreen() {
            // 背景已由 drawBackground() 处理

            // 1. 绘制药丸
            for (const pill of pills) {
                drawPill(pill);
            }

            // 2. 绘制加速道具
            for (const item of boostItems) {
                drawBoostItem(item);
            }

            // 3. 绘制障碍物
            for (const obs of obstacles) {
                drawObstacle(obs);
            }

            // 4. 绘制追赶者（在玩家后面，不受障碍物影响）
            const px = CONFIG.CANVAS_WIDTH * CONFIG.PLAYER_X_RATIO;
            const py = CONFIG.PLAYER_GROUND_Y + playerY;
            const pursuerX = px - pursuerGap;
            drawPursuer(pursuerX, CONFIG.PLAYER_GROUND_Y);

            // 5. 绘制玩家角色
            const scaleY = playerDucking ? 0.55 : 1.0;
            drawPlayer(px, py, scaleY);

            // 5. 绘制 UI：心率条 + 能量条 + 分数
            drawHeartRateBar();
            drawEnergyBar();
            drawScoreUI();
        }

        // 绘制加速道具
        function drawBoostItem(item) {
            const { x, y, size, type } = item;
            const cx = x + size / 2;
            const cy = y;

            ctx.save();
            ctx.translate(cx, cy);
            // 轻微浮动动画
            const bob = Math.sin(Date.now() / 200 + x * 0.02) * 3;
            const rotate = Math.sin(Date.now() / 400 + x * 0.01) * 0.2;
            ctx.translate(0, bob);
            ctx.rotate(rotate);

            // 光晕
            const glowColor = type === 'choclez'
                ? 'rgba(255,105,180,0.4)'
                : 'rgba(0,204,102,0.4)';
            ctx.fillStyle = glowColor;
            ctx.beginPath();
            ctx.arc(0, -size / 2, size * 0.7, 0, Math.PI * 2);
            ctx.fill();

            if (type === 'choclez') {
                drawChoclez(0, -size / 2, size);
            } else {
                drawSprite(0, -size / 2, size);
            }

            ctx.restore();
        }

        // 绘制巧乐兹（粉色雪糕）
        function drawChoclez(cx, cy, size) {
            const s = size;
            // 木棍
            ctx.fillStyle = '#D2B48C';
            ctx.fillRect(cx - 3, cy + s * 0.3, 6, s * 0.55);
            // 巧克力涂层
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.roundRect(cx - s * 0.4, cy - s * 0.5, s * 0.8, s * 0.55, [s * 0.2, s * 0.2, 0, 0]);
            ctx.fill();
            // 粉色雪糕体
            ctx.fillStyle = CONFIG.BOOST_CHOCLEZ_COLOR;
            ctx.beginPath();
            ctx.roundRect(cx - s * 0.32, cy - s * 0.5, s * 0.64, s * 0.55, [s * 0.16, s * 0.16, 0, 0]);
            ctx.fill();
            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.roundRect(cx - s * 0.18, cy - s * 0.4, s * 0.2, s * 0.3, 3);
            ctx.fill();
            // 标签文字
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 8px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('巧', cx, cy - s * 0.05);
            ctx.textAlign = 'start';
        }

        // 绘制雪碧（绿色汽水瓶）
        function drawSprite(cx, cy, size) {
            const s = size;
            // 瓶身
            ctx.fillStyle = CONFIG.BOOST_SPRITE_COLOR;
            ctx.beginPath();
            ctx.roundRect(cx - s * 0.3, cy - s * 0.45, s * 0.6, s * 0.85, s * 0.15);
            ctx.fill();
            // 瓶盖
            ctx.fillStyle = '#C0C0C0';
            ctx.beginPath();
            ctx.roundRect(cx - s * 0.2, cy - s * 0.55, s * 0.4, s * 0.15, 3);
            ctx.fill();
            // 标签
            ctx.fillStyle = '#FFF';
            ctx.fillRect(cx - s * 0.25, cy - s * 0.1, s * 0.5, s * 0.2);
            // 标签文字
            ctx.fillStyle = CONFIG.BOOST_SPRITE_COLOR;
            ctx.font = 'bold 8px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('雪碧', cx, cy + s * 0.04);
            ctx.textAlign = 'start';
            // 气泡
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.arc(cx + s * 0.15, cy - s * 0.25, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx - s * 0.1, cy - s * 0.15, 2, 0, Math.PI * 2);

        // 绘制能量条
        function drawEnergyBar() {
            if (!boostActive) return; // 只在加速时显示

            const by = CONFIG.ENERGY_BAR_Y;
            const bw = CONFIG.ENERGY_BAR_W;
            const bh = CONFIG.ENERGY_BAR_H;

            // 背景

            roundRect(bx, by, bw * pct, bh, 2, true, false);

        // 绘制分数
        function drawScoreUI() {
            const txt = `🏆 ${score}`;

            ctx.fillStyle = 'rgba(0,0,0,0.45)';

        // 绘制心率条
        function drawHeartRateBar() {
            const bx = CONFIG.HR_BAR_X;
            const by = CONFIG.HR_BAR_Y;
            const bw = CONFIG.HR_BAR_W;
            const bh = CONFIG.HR_BAR_H;
            const pct = heartRate / CONFIG.HEART_RATE_MAX;

            // 背景
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            roundRect(bx - 2, by - 2, bw + 4, bh + 4, 6, true, false);

            // 颜色根据心率百分比变化
            let barColor;
            if (pct < 0.5) {
                barColor = lerpColor(CONFIG.HR_COLOR_SAFE, CONFIG.HR_COLOR_WARN, pct / 0.5);
            } else if (pct < 0.75) {
                barColor = lerpColor(CONFIG.HR_COLOR_WARN, CONFIG.HR_COLOR_DANGER, (pct - 0.5) / 0.25);
            } else {
                barColor = CONFIG.HR_COLOR_DANGER;
            }

            // 心率条填充
            const fillW = bw * pct;
            ctx.fillStyle = barColor;
            roundRect(bx, by, fillW, bh, 4, true, false);

            // 边框
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            roundRect(bx, by, bw, bh, 4, false, true);

            // 心形图标
            const heartX = bx - 20;
            const heartY = by + bh / 2;
            ctx.fillStyle = pct > 0.75 ? '#F44336' : '#FF5252';
            ctx.font = '18px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('❤️', heartX, heartY);
            ctx.textAlign = 'start';
            ctx.textBaseline = 'alphabetic';

            // 心率数值
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${Math.round(heartRate)}%`, bx + bw / 2, by + bh / 2 + 1);
            ctx.textAlign = 'start';

            // 危险闪烁（心率 > 75%）
            if (pct > 0.75 && Math.sin(Date.now() / 150) > 0) {
                ctx.strokeStyle = 'rgba(255,0,0,0.7)';
                ctx.lineWidth = 3;
                roundRect(bx - 2, by - 2, bw + 4, bh + 4, 6, false, true);
            }
        }

        // 绘制药丸
        function drawPill(pill) {
            const { x, y, width: w, height: h } = pill;
            const cx = x + w / 2;
            const cy = y + h / 2;

            ctx.save();
            ctx.translate(cx, cy);
            // 轻微旋转让药丸看起来更动感
            const angle = Math.sin(Date.now() / 300 + x * 0.01) * 0.15;
            ctx.rotate(angle);

            // 阴影
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 2, -h / 2 + 2, w, h, h / 2);
            ctx.fill();

            // 白色半片
            ctx.fillStyle = CONFIG.PILL_COLOR_WHITE;
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w / 2, h, [h / 2, 0, 0, h / 2]);
            ctx.fill();

            // 红色半片
            ctx.fillStyle = CONFIG.PILL_COLOR_RED;
            ctx.beginPath();
            ctx.roundRect(0, -h / 2, w / 2, h, [0, h / 2, h / 2, 0]);
            ctx.fill();

            // 中间分割线
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(1, -h / 2 + 3);
            ctx.lineTo(1, h / 2 - 3);
            ctx.stroke();

            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 5, -h / 2 + 2, w - 10, 4, 2);
            ctx.fill();

            ctx.restore();
        }

        // 绘制单个障碍物
        function drawObstacle(obs) {
            if (obs.type === 'ground') {
                drawGroundObstacle(obs.x, obs.y, obs.width, obs.height);
            } else {
                drawOverheadObstacle(obs.x, obs.y, obs.width, obs.height);

        // 绘制地面障碍（箱子）
        function drawGroundObstacle(x, y, w, h) {

            ctx.strokeStyle = '#5C3A1E';
            ctx.lineWidth = 2.5;
            roundRect(x, y, w, h, 5, false, true);
            // 十字绑带（竖）

            ctx.fillRect(x + w / 2 - 3, y, 6, h);

            ctx.fillRect(x, y + h / 2 - 3, w, 6);

        // 绘制上方障碍（横梁 + 支架）
        function drawOverheadObstacle(x, y, w, h) {
            // 横梁主体
            ctx.fillStyle = CONFIG.OBS_BEAM_COLOR;

            // 黄黑警示条纹

            ctx.fillStyle = CONFIG.OBS_BEAM_STRIPE;

                ctx.fillRect(sx, y, stripeW, h);

            // 边框
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            roundRect(x, y, w, h, 3, false, true);
            // 两侧支架
            ctx.fillStyle = '#666';
            ctx.fillRect(x + 8, y - 8, 8, 10);
            ctx.fillRect(x + w - 16, y - 8, 8, 10);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 14px sans-serif';

        // -------------------- FPS 显示 --------------------

        // -------------------- 工具函数 --------------------

        /**
         * 绘制文字（居中）
         * @param {string} text - 文字内容
         * @param {number} x - X 坐标
         * @param {number} y - Y 坐标（baseline）
         * @param {object} opts - 选项 { size, color, font, stroke, strokeColor, strokeWidth }
         */
        function drawText(text, x, y, opts = {}) {
            const {
                size = 20,
                    color = '#FFFFFF',
                    font = 'Microsoft YaHei, PingFang SC, sans-serif',
                    stroke = false,
                    strokeColor = '#000000',
                    strokeWidth = 2,
            } = opts;

            ctx.font = `bold ${size}px "${font}"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (stroke) {
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.lineJoin = 'round';
                ctx.strokeText(text, x, y);
            }

            ctx.fillStyle = color;
            ctx.fillText(text, x, y);

            // 恢复默认
            ctx.textAlign = 'start';
            ctx.textBaseline = 'alphabetic';
        }

        /**
         * 颜色线性插值
         * @param {string} c1 - 起始颜色（hex）
         * @param {string} c2 - 结束颜色（hex）
         * @param {number} t - 插值比例 (0-1)
         * @returns {string} 插值后的 hex 颜色
         */
        function lerpColor(c1, c2, t) {
            const r1 = parseInt(c1.slice(1, 3), 16);
            const g1 = parseInt(c1.slice(3, 5), 16);
            const b1 = parseInt(c1.slice(5, 7), 16);
            const r2 = parseInt(c2.slice(1, 3), 16);
            const g2 = parseInt(c2.slice(3, 5), 16);
            const b2 = parseInt(c2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        /**
         * 根据心率值返回对应的脸部颜色
         * @param {number} hr - 心率值 (0-100)
         * @returns {string} 颜色 hex 值
         */
        function getFaceColor(hr) {
            const pct = hr / CONFIG.HEART_RATE_MAX; // 0-1
            if (pct <= 0.25) {
                return lerpColor(CONFIG.PLAYER_SKIN, CONFIG.PLAYER_SKIN_PURPLE1, pct / 0.25);
            } else if (pct <= 0.5) {
                return lerpColor(CONFIG.PLAYER_SKIN_PURPLE1, CONFIG.PLAYER_SKIN_PURPLE2, (pct - 0.25) / 0.25);
            } else if (pct <= 0.75) {
                return lerpColor(CONFIG.PLAYER_SKIN_PURPLE2, CONFIG.PLAYER_SKIN_PURPLE3, (pct - 0.5) / 0.25);
            } else {
                return CONFIG.PLAYER_SKIN_PURPLE3;
            }
        }

        // -------------------- 角色绘制 --------------------

        /**
         * 绘制完整的玩家角色
         * @param {number} baseX - 角色脚底中心 X
         * @param {number} baseY - 角色脚底 Y
        /**
         * 绘制追赶者（安全帽 + 绿色反光背心）
         */
        function drawPursuer(baseX, baseY) {
            const h = 65; // 总高度
            const headR = 11;
            const headCY = baseY - h + headR;
            const phase = pursuerAnimTime / 0.3 * Math.PI * 2;
            const legSwing = Math.sin(phase) * 0.4;
            const armSwing = Math.sin(phase) * 0.45;

            ctx.save();
            ctx.translate(baseX, 0);

            // 阴影
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.ellipse(0, baseY - 1, 12, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            // 腿（深色工装裤）
            const hipY = baseY - 22;
            drawPursuerLeg(-4, hipY, 22, -legSwing);
            drawPursuerLeg(4, hipY, 22, legSwing);

            // 身体（绿色反光背心）
            const bodyTop = hipY - 22;
            const bodyW = 18;
            const bodyH = 22;
            // 深色工装
            ctx.fillStyle = '#2E4057';
            ctx.fillRect(-bodyW / 2 - 1, bodyTop, bodyW + 2, bodyH);
            // 绿色反光背心
            ctx.fillStyle = '#39FF14';
            ctx.fillRect(-bodyW / 2, bodyTop, bodyW, bodyH);
            // 反光条
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(-bodyW / 2, bodyTop + 6, bodyW, 3);
            ctx.fillRect(-bodyW / 2, bodyTop + 14, bodyW, 3);

            // 手臂
            drawPursuerArm(-bodyW / 2 - 1, bodyTop + 2, 16, -armSwing);
            drawPursuerArm(bodyW / 2 + 1, bodyTop + 2, 16, armSwing);

            // 头部
            ctx.fillStyle = '#FFDAB9';
            ctx.beginPath();
            ctx.arc(0, headCY, headR, 0, Math.PI * 2);
            ctx.fill();
            // 安全帽
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(0, headCY - headR * 0.3, headR * 1.2, Math.PI, 2 * Math.PI);
            ctx.fill();
            // 帽檐
            ctx.fillStyle = '#E6BE00';
            ctx.fillRect(-headR * 1.3, headCY - headR * 0.3, headR * 2.6, 3);

            ctx.restore();
        }

        function drawPursuerLeg(hipX, hipY, len, angle) {
            ctx.save();
            ctx.translate(hipX, hipY);
            ctx.rotate(angle);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(-4, 0, 8, len * 0.8);
            ctx.fillStyle = '#333';
            ctx.fillRect(-5, len * 0.8, 10, 6);
            ctx.restore();
        }

        function drawPursuerArm(shoulderX, shoulderY, len, angle) {
            ctx.save();
            ctx.translate(shoulderX, shoulderY);
            ctx.rotate(angle);
            ctx.fillStyle = '#2E4057';
            ctx.fillRect(-3, 0, 6, len * 0.5);
            ctx.fillStyle = '#FFDAB9';
            ctx.beginPath();
            ctx.arc(0, len * 0.6, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        /**
         * @param {number} scaleY - 垂直缩放（1=正常，<1 低头时缩小）
         */
        function drawPlayer(baseX, baseY, scaleY) {
            const img = document.getElementById('playerImg');
            if (!img || !img.complete) return;
            const naturalW = img.naturalWidth || 120;
            const naturalH = img.naturalHeight || 200;
            const targetH = CONFIG.PLAYER_TOTAL_HEIGHT * 1.2 * scaleY;
            const targetW = naturalW * (targetH / naturalH);
            const px = baseX - targetW / 2;
            const py = baseY - targetH;
            ctx.save();
            // 阴影
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.ellipse(baseX, baseY - 1, targetW / 3, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            // 绘制照片人物
            ctx.drawImage(img, px, py, targetW, targetH);
            ctx.restore();
            return;
        }
        function drawHead(x, cy, r, scale) {
            // 头发（后层）
            ctx.fillStyle = CONFIG.PLAYER_HAIR;
            ctx.beginPath();
            ctx.arc(x, cy - r * 0.2, r * 1.12, Math.PI, 2 * Math.PI);
            ctx.fill();
            // 刘海
            ctx.beginPath();
            ctx.ellipse(x, cy - r * 0.5, r * 1.05, r * 0.5, 0, Math.PI, 2 * Math.PI);
            ctx.fill();

            // 脸
            const faceColor = getFaceColor(heartRate);
            ctx.fillStyle = faceColor;
            ctx.beginPath();
            ctx.arc(x, cy, r, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            const eyeY = cy - r * 0.15;
            const eyeSpacing = r * 0.4;
            // 左眼
            ctx.fillStyle = CONFIG.PLAYER_EYE;
            ctx.beginPath();
            ctx.arc(x - eyeSpacing, eyeY, r * 0.22, 0, Math.PI * 2);
            ctx.fill();
            // 右眼
            ctx.beginPath();
            ctx.arc(x + eyeSpacing, eyeY, r * 0.22, 0, Math.PI * 2);
            ctx.fill();
            // 眼睛高光
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x - eyeSpacing - r * 0.06, eyeY - r * 0.06, r * 0.09, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + eyeSpacing - r * 0.06, eyeY - r * 0.06, r * 0.09, 0, Math.PI * 2);
            ctx.fill();

            // 嘴巴（微笑弧线）
            ctx.strokeStyle = '#C0756B';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(x, cy + r * 0.15, r * 0.3, 0, Math.PI);
            ctx.stroke();

            // 脸颊红晕
            ctx.fillStyle = 'rgba(255,150,150,0.3)';
            ctx.beginPath();
            ctx.ellipse(x - r * 0.55, cy + r * 0.15, r * 0.22, r * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + r * 0.55, cy + r * 0.15, r * 0.22, r * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制身体/上衣
        function drawBody(x, topY, w, h, scale) {
            // 上衣主体（梯形，上窄下宽）
            ctx.fillStyle = CONFIG.PLAYER_SHIRT;
            ctx.beginPath();
            ctx.moveTo(x - w * 0.35, topY);       // 左肩
            ctx.lineTo(x - w * 0.55, topY + h);   // 左腰
            ctx.lineTo(x + w * 0.55, topY + h);   // 右腰
            ctx.lineTo(x + w * 0.35, topY);       // 右肩
            ctx.closePath();
            ctx.fill();

            // 上衣褶皱/暗部
            ctx.fillStyle = CONFIG.PLAYER_SHIRT_DARK;
            ctx.fillRect(x - w * 0.12, topY + 6, w * 0.25, h - 6);

            // 领口装饰线
            ctx.strokeStyle = CONFIG.PLAYER_SHIRT_DARK;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x - w * 0.2, topY + 2);
            ctx.quadraticCurveTo(x, topY + 8, x + w * 0.2, topY + 2);
            ctx.stroke();
        }

        // 绘制一条腿
        function drawLeg(hipX, hipY, length, angle, scale) {
            ctx.save();
            ctx.translate(hipX, hipY);
            ctx.rotate(angle);

            const legW = 7 * scale;
            // 裤子
            ctx.fillStyle = CONFIG.PLAYER_PANTS;
            ctx.fillRect(-legW / 2, 0, legW, length * 0.85);
            // 裤缝线
            ctx.fillStyle = CONFIG.PLAYER_PANTS_DARK;
            ctx.fillRect(-1, 0, 2, length * 0.85);

            // 鞋子
            const shoeY = length * 0.85;
            ctx.fillStyle = CONFIG.PLAYER_SHOE;
            ctx.beginPath();
            ctx.roundRect(-legW / 2 - 2, shoeY, legW + 4, 9 * scale, 3);
            ctx.fill();
            // 鞋底
            ctx.fillStyle = CONFIG.PLAYER_SHOE_DARK;
            ctx.fillRect(-legW / 2 - 2, shoeY + 5 * scale, legW + 4, 4 * scale);

            ctx.restore();
        }

        // 绘制一条手臂
        function drawArm(shoulderX, shoulderY, length, angle, scale) {
            ctx.save();
            ctx.translate(shoulderX, shoulderY);
            ctx.rotate(angle);

            const armW = 5.5 * scale;
            // 袖子（上臂部分）
            ctx.fillStyle = CONFIG.PLAYER_SHIRT;
            ctx.fillRect(-armW / 2, 0, armW, length * 0.45);
            // 手（肤色）
            ctx.fillStyle = CONFIG.PLAYER_SKIN;
            ctx.beginPath();
            ctx.arc(0, length * 0.55, armW * 0.7, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }
        function roundRect(x, y, w, h, r, fill = true, stroke = false) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }

        // -------------------- 游戏主循环 --------------------
        function gameLoop(timestamp) {
            // 计算帧间隔
            if (lastTime === 0) lastTime = timestamp;
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            // FPS 统计
            fpsFrames++;
            fpsElapsed += dt;
            if (fpsElapsed >= 1000) {
                fps = fpsFrames;
                fpsFrames = 0;
                fpsElapsed = 0;
            }

            // 更新 + 渲染
            update(dt);
            render();

            // 下一帧
            requestAnimationFrame(gameLoop);
        }

        // -------------------- 启动游戏 --------------------
        console.log('🚀 跑酷小游戏初始化完成');
        console.log(`   画布: ${CONFIG.CANVAS_WIDTH}×${CONFIG.CANVAS_HEIGHT}`);
        console.log(`   状态: ${gameState}`);
        console.log('   按空格键开始游戏');

        // 启动主循环
        requestAnimationFrame(gameLoop);
    </script>
</body>
